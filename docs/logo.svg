<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c07a"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app tile -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#glow)"/>

  <!-- broadcast / relay signal arcs above the power button -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M 176 196 A 110 110 0 0 1 336 196" stroke-width="18" opacity="0.35"/>
    <path d="M 206 168 A 70 70 0 0 1 306 168" stroke-width="18" opacity="0.65"/>
  </g>

  <!-- power symbol -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <path d="M 305 248 A 86 86 0 1 1 207 248" stroke-width="32"/>
    <line x1="256" y1="214" x2="256" y2="312" stroke-width="32"/>
  </g>
</svg>
