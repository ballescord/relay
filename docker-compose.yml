services:
  relay:
    build: .
    # Or use a prebuilt image instead of build:
    # image: ghcr.io/YOURNAME/relay:latest
    container_name: relay
    restart: unless-stopped

    # host networking lets the Wake-on-LAN broadcast reach your LAN directly.
    network_mode: host

    # Port the panel listens on (default 8765). Override via a .env file or
    # the shell, e.g.  PORT=8766 docker compose up -d
    environment:
      - PORT=${PORT:-8765}

    volumes:
      # Config + SSH key live here. Writable: the panel manages devices and
      # auto-generates the SSH key on first start.
      - ./config:/config

    # If you are NOT using host networking, expose the port instead:
    # ports:
    #   - "8765:8765"
